upstream adham-land {
  server 127.0.0.1:4601;
  keepalive 32;
}

server {
  listen 80;
  server_name adham-land.futuresolutionsdev.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name adham-land.futuresolutionsdev.com;

  # ── SSL (update paths to match your server) ──
  ssl_certificate     /etc/letsencrypt/live/adham-land.futuresolutionsdev.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/adham-land.futuresolutionsdev.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;

  # ── Gzip ──
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_vary on;
  gzip_types
    text/css
    text/javascript
    application/javascript
    application/json
    image/svg+xml
    text/plain;

  # ── No cache for everything ──
  add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
  add_header Pragma "no-cache" always;
  expires -1;

  # ── Next.js static assets ──
  location /_next/static/ {
    proxy_pass https://adham-land;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # ── Public folder assets ──
  location /Imgs/ {
    proxy_pass https://adham-land;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # ── Next.js image optimization ──
  location /_next/image {
    proxy_pass https://adham-land;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
  }

  # ── All other requests (SSR + proxy) ──
  location / {
    proxy_pass https://adham-land;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
      location / {
        proxy_pass http://127.0.0.1:3031;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-HOST $remote_addr;
        add_header X-Cache $upstream_cache_status;

        proxy_connect_timeout 30s;
        proxy_read_timeout 86400s;
        proxy_send_timeout 30s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
